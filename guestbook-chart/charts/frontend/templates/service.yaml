apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-{{ .Values.appName }}-service
  namespace: {{ .Values.namespace }}
spec:
  ports:
  - name: http
    port: 80
    targetPort: 8080
  - name: metrics
    port: 9113
    targetPort: 9113
  selector:
    app: {{ .Release.Name }}-{{ .Values.appName }}