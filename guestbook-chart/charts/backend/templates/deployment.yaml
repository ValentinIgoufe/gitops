apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Values.appName }}-deployment
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: {{ .Release.Name }}-{{ .Values.appName }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-{{ .Values.appName }}
    spec:
      automountServiceAccountToken: false
      containers:
        - image: {{ .Values.image }}
          name: {{ .Release.Name }}-{{ .Values.appName }}
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: cache-volume
              mountPath: /var/cache/nginx
            - name: run-volume
              mountPath: /var/run
            - name: tmp-volume
              mountPath: /tmp
          # Least Privilege
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsUser: 101
            runAsNonRoot: true
          # Resources
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:latest
          args:
            - -nginx.scrape-uri=http://127.0.0.1:8080/nginx_status
          ports:
            - containerPort: 9113
      volumes:
        - name: cache-volume
          emptyDir: {}
        - name: run-volume
          emptyDir: {}
        - name: tmp-volume
          emptyDir: {}