apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vpa-controller
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://charts.fairwinds.com/stable' 
    chart: vpa                                       
    targetRevision: 4.11.0                            
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true