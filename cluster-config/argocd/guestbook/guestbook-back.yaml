apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ValentinIgoufe/gitops
    targetRevision: HEAD
    path: apps/guestbook/backend
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: guestbook-backend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true