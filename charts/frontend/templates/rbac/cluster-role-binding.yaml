apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-{{ .Values.appName }}-crb
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-{{ .Values.appName }}-sa
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-{{ .Values.appName }}-cluster-role
  apiGroup: rbac.authorization.k8s.io