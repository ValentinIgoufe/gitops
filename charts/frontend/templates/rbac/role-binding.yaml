apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-{{ .Values.appName }}-rb
  namespace: {{ .Values.namespace }}
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-{{ .Values.appName }}-sa
roleRef:
  kind: Role
  name: {{ .Release.Name }}-{{ .Values.appName }}-reader-role
  apiGroup: rbac.authorization.k8s.io