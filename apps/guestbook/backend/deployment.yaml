apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook-backend-deployment
  namespace: guestbook-backend
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: guestbook-backend
  template:
    metadata:
      labels:
        app: guestbook-backend
    spec:
      containers:
        - image: gcr.io/google-samples/gb-frontend:v5
          name: guestbook-backend
          ports:
            - containerPort: 80
          # Least Privilege
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsUser: 1000
            runAsNonRoot: true
          automountServiceAccountToken: false
          # Resources
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi