apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook-backend-deployment
  namespace: guestbook-backend
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: guestbook-backend
  template:
    metadata:
      labels:
        app: guestbook-backend
    spec:
      containers:
        - image: valouche190705/guestbook:v0.0.3
          name: guestbook-backend
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: cache-volume
              mountPath: /var/cache/nginx
            - name: run-volume
              mountPath: /var/run
            - name: tmp-volume
              mountPath: /tmp
          # Least Privilege
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            #runAsUser: 1000
            runAsNonRoot: true
          automountServiceAccountToken: false
          # Resources
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: cache-volume
          emptyDir: {}
        - name: run-volume
          emptyDir: {}
        - name: tmp-volume
          emptyDir: {}