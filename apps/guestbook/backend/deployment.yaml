apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook-backend-deployment
  namespace: guestbook-backend
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: guestbook-backend
  template:
    metadata:
      labels:
        app: guestbook-backend
    spec:
      containers:
        - image: gcr.io/google-samples/gb-frontend:v5
          name: guestbook-backend
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi