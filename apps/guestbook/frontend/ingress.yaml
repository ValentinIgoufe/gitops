apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: guestbook-frontend-ingress
  namespace: guestbook-frontend
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: guestbook.127.0.0.1.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: guestbook-frontend-service
            port:
              number: 80