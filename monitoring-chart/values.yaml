# Monitoring Stack Values
global:
  monitoring:
    namespace: monitoring

# Prometheus Stack Configuration
prometheusStack:
  enabled: true
  namespaceOverride: monitoring
  fullnameOverride: monitoring-stack
  
  grafana:
    enabled: true
    adminPassword: "admin"
    namespaceOverride: monitoring
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - grafana.127.0.0.1.nip.io
      annotations:
        kubernetes.io/ingress.class: nginx
        nginx.ingress.kubernetes.io/rewrite-target: /
  
  prometheus:
    enabled: true
    prometheusSpec:
      namespaceSelector: {}
      retention: "7d"
      retentionSize: "45GB"
      resources:
        requests:
          memory: "1Gi"
          cpu: "500m"
        limits:
          memory: "2Gi"
          cpu: "1"
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
  
  alertmanager:
    enabled: true
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
